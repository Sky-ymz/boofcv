name: build-arm64-native

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'reflect-config.json'
      - 'build_aarch64.sh'
      - 'Dockerfile'
      - '.github/workflows/build-arm64.yml'
  workflow_dispatch:

jobs:
  build-aarch64:
    runs-on: ubuntu-24.04    # 普通 x86_64 runner — 不需要 ARM 配额

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU (cross-arch emulation)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Pre-download GraalVM tarball on host (x86_64, fast)
      - name: Pre-download GraalVM on host
        run: |
          mkdir -p /tmp/graalvm-prebuilt
          cd /tmp/graalvm-prebuilt
          if [ ! -f graalvm-community-jdk-21.0.2_linux-aarch64_bin.tar.gz ]; then
            echo "Downloading GraalVM..."
            curl -fL -o graalvm-community-jdk-21.0.2_linux-aarch64_bin.tar.gz \
              "https://github.com/graalvm/graalvm-ce-builds/releases/download/jdk-21.0.2/graalvm-community-jdk-21.0.2_linux-aarch64_bin.tar.gz"
          fi
          ls -lh /tmp/graalvm-prebuilt/
          # Copy (NOT symlink — docker build context doesn't follow symlinks)
          cd $GITHUB_WORKSPACE
          cp /tmp/graalvm-prebuilt/graalvm-community-jdk-21.0.2_linux-aarch64_bin.tar.gz graalvm.tar.gz
          ls -lh graalvm.tar.gz

      - name: Build aarch64 binary in ARM container
        run: |
          docker buildx build \
            --platform linux/arm64 \
            --load \
            --build-arg OUTPUT_NAME=boofcv_qr_cli_arm64 \
            --file Dockerfile \
            -t boofcv-arm64 .
          rm -f graalvm.tar.gz

      - name: Extract binary from container
        run: |
          CID=$(docker create boofcv-arm64)
          docker cp $CID:/workspace/boofcv_qr_cli_arm64 ./boofcv_qr_cli_arm64
          docker rm $CID
          chmod +x boofcv_qr_cli_arm64
          ls -lh boofcv_qr_cli_arm64
          file boofcv_qr_cli_arm64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: boofcv_qr_cli-arm64-${{ github.sha }}
          path: boofcv_qr_cli_arm64
          retention-days: 7

      - name: Print download info
        run: |
          echo ""
          echo "=========================================="
          echo "✅ aarch64 native binary ready!"
          echo "Download from:"
          echo "  https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          echo ""
          echo "Artifact: boofcv_qr_cli-arm64-${{ github.sha }}"
          echo "Size: $(du -h boofcv_qr_cli_arm64 | cut -f1)"
          echo "=========================================="