name: build-ohos-musl-jdk

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/build-ohos-musl-jdk.yml'
      - 'scripts/build-jdk.sh'
      - 'scripts/verify-jdk.sh'

jobs:
  build-ohos-jdk:
    # 用普通 x86_64 runner 装 LLVM 19 (apt) + OHOS sysroot (release 下载，66MB)
    runs-on: ubuntu-24.04
    timeout-minutes: 90

    env:
      OHOS_SYSROOT_VERSION: "1.0.0"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install boot JDK 21 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install LLVM 19 + build deps
        run: |
          echo "--- 装 LLVM 19 + OpenJDK build deps ---"
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc > /dev/null
          echo "deb http://apt.llvm.org/noble/ llvm-toolchain-noble-19 main" | sudo tee /etc/apt/sources.list.d/llvm-19.list
          sudo apt-get update
          sudo apt-get install -y \
            llvm-19 clang-19 lld-19 libc++-19-dev libc++abi-19-dev \
            autoconf automake libtool pkg-config \
            zip unzip git curl wget xz-utils

          echo ""
          echo "--- 验证 clang ---"
          clang-19 --version
          ld.lld-19 --version | head -2

      - name: Download OHOS sysroot (66 MB)
        # OHOS sysroot 单独打包（不含 LLVM 工具链），体积小
        # 来源：boofcv repo release
        run: |
          echo "--- 下载 OHOS aarch64 sysroot (66MB) ---"
          mkdir -p sysroot
          cd sysroot
          # 从 boofcv release 下载 sysroot（之前你提的 KMP 用的）
          SYSROOT_URL="https://github.com/Sky-ymz/boofcv/releases/download/ohos-sysroot-1.0.0/ohos-sysroot-aarch64-6.0.2.640-04.tar.gz"
          wget -q --tries=3 --timeout=120 -O sysroot.tar.gz "$SYSROOT_URL" || {
            echo "❌ OHOS sysroot 未上传到 release"
            echo "   请先在本地 WSL 端打包:"
            echo "   cd /home/ymz/.konan/dependencies/sysroot-ohos-aarch64-6.0.2.640-04"
            echo "   tar -czf ohos-sysroot-aarch64-6.0.2.640-04.tar.gz ."
            echo "   gh release create ohos-sysroot-1.0.0 ohos-sysroot-aarch64-6.0.2.640-04.tar.gz"
            exit 5
          }
          ls -lh
          tar -xzf sysroot.tar.gz
          ls -la
          cd ..

          SYSROOT_DIR=$(pwd)/sysroot/sysroot
          echo "SYSROOT_DIR: $SYSROOT_DIR"
          if [ -d "$SYSROOT_DIR/usr/include" ]; then
            ls $SYSROOT_DIR/usr/include | head -5
          fi

          # 找 clang wrapper（需要包装成 aarch64-unknown-linux-ohos-clang）
          mkdir -p toolchain/bin
          cat > toolchain/bin/aarch64-unknown-linux-ohos-clang << EOF
#!/bin/bash
exec clang-19 \\
    --target=aarch64-linux-ohos \\
    --sysroot=$SYSROOT_DIR \\
    --gcc-toolchain=$SYSROOT_DIR \\
    -fuse-ld=lld-19 \\
    "\$@"
EOF
          chmod +x toolchain/bin/aarch64-unknown-linux-ohos-clang
          cat > toolchain/bin/aarch64-unknown-linux-ohos-clang++ << EOF
#!/bin/bash
exec clang-19 \\
    --target=aarch64-linux-ohos \\
    --sysroot=$SYSROOT_DIR \\
    --gcc-toolchain=$SYSROOT_DIR \\
    -fuse-ld=lld-19 \\
    -stdlib=libc++ \\
    "\$@"
EOF
          chmod +x toolchain/bin/aarch64-unknown-linux-ohos-clang++

          echo "--- 验证 wrapper ---"
          toolchain/bin/aarch64-unknown-linux-ohos-clang --version | head -1
          echo ""
          echo '--- 测试编译 OHOS 二进制 ---'
          echo 'int main() { return 0; }' > /tmp/test.c
          toolchain/bin/aarch64-unknown-linux-ohos-clang -static /tmp/test.c -o /tmp/test_ohos
          file /tmp/test_ohos

          # 写到 env
          echo "CC=$(pwd)/toolchain/bin/aarch64-unknown-linux-ohos-clang" >> $GITHUB_ENV
          echo "CXX=$(pwd)/toolchain/bin/aarch64-unknown-linux-ohos-clang++" >> $GITHUB_ENV
          echo "SYSROOT=$SYSROOT_DIR" >> $GITHUB_ENV

      - name: Build OHOS musl OpenJDK 21
        run: |
          chmod +x scripts/build-jdk.sh
          bash scripts/build-jdk.sh 2>&1 | tail -100

      - name: Upload JDK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ohos-musl-jdk-21-${{ github.sha }}
          path: build-output/ohos-musl-jdk-21.tar.gz
          retention-days: 30
          if-no-files-found: error

      - name: Upload verify script
        uses: actions/upload-artifact@v4
        with:
          name: verify-jdk-script
          path: scripts/verify-jdk.sh
          retention-days: 30

      - name: Print download info
        if: success()
        run: |
          echo ""
          echo "=========================================="
          echo "✅ OHOS musl OpenJDK 21 build done!"
          echo "=========================================="
          echo "Download: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          echo "Artifact: ohos-musl-jdk-21-${{ github.sha }}"
          echo ""
          echo "下一步："
          echo "1. 下载 artifact"
          echo "2. 推鸿蒙 PC + java -version 验证 H2b"
          echo "=========================================="
