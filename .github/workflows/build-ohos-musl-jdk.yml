name: build-ohos-musl-jdk

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/build-ohos-musl-jdk.yml'
      - 'scripts/build-jdk.sh'
      - 'scripts/verify-jdk.sh'
      - 'scripts/setup-ohos-toolchain.sh'
      - 'sysroot-ohos.tar.gz'
      - 'kmp-clang-resource.tar.gz'

jobs:
  build-ohos-jdk:
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install boot JDK 21 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install LLVM 19 + build deps
        run: |
          echo "--- 装 LLVM 19 ---"
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc > /dev/null
          echo "deb http://apt.llvm.org/noble/ llvm-toolchain-noble-19 main" | sudo tee /etc/apt/sources.list.d/llvm-19.list
          sudo apt-get update
          sudo apt-get install -y \
            llvm-19 clang-19 lld-19 libc++-19-dev libc++abi-19-dev \
            autoconf automake libtool pkg-config \
            zip unzip git curl wget xz-utils

          echo ""
          echo "--- 验证 clang ---"
          clang-19 --version
          ld.lld-19 --version | head -1

      - name: Extract sysroot + KMP resource + setup toolchain
        run: |
          echo "--- 解压 OHOS sysroot (12MB) ---"
          mkdir -p sysroot toolchain kmp-resource
          tar -xzf sysroot-ohos.tar.gz -C sysroot

          echo "--- 解压 KMP clang aarch64-ohos resource (11MB) ---"
          tar -xzf kmp-clang-resource.tar.gz -C kmp-resource
          ls kmp-resource/lib/aarch64-linux-ohos/ | head -5

          echo ""
          echo "--- 创建 clang wrapper ---"
          chmod +x scripts/setup-ohos-toolchain.sh
          bash scripts/setup-ohos-toolchain.sh "$(pwd)/sysroot" "$(pwd)/toolchain/bin" "$(pwd)/kmp-resource"

          echo "CC=$(pwd)/toolchain/bin/aarch64-unknown-linux-ohos-clang" >> $GITHUB_ENV
          echo "CXX=$(pwd)/toolchain/bin/aarch64-unknown-linux-ohos-clang++" >> $GITHUB_ENV
          echo "SYSROOT=$(pwd)/sysroot" >> $GITHUB_ENV
          echo "TOOLCHAIN_DIR=$(pwd)/toolchain" >> $GITHUB_ENV

      - name: Build OHOS OpenJDK 21 (dynamic link)
        # 不要用 tail 截断! 让所有 log 都显示
        run: |
          chmod +x scripts/build-jdk.sh
          # 重定向到文件 + 显示末尾 + 保存到 log artifact
          bash scripts/build-jdk.sh 2>&1 | tee build-jdk-output.log
          echo "--- BUILD-JDK EXIT: ${PIPESTATUS[0]} ---"

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-jdk-log-${{ github.sha }}
          path: build-jdk-output.log
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload JDK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ohos-jdk-21-dynamic-${{ github.sha }}
          path: build-output/ohos-jdk-21-dynamic.tar.gz
          retention-days: 30
          if-no-files-found: error

      - name: Upload verify script
        uses: actions/upload-artifact@v4
        with:
          name: verify-jdk-script
          path: scripts/verify-jdk.sh
          retention-days: 30

      - name: Print download info
        if: success()
        run: |
          echo "=========================================="
          echo "OHOS OpenJDK 21 build done!"
          echo "Download: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          echo "Artifact: ohos-jdk-21-dynamic-${{ github.sha }}"
          echo "=========================================="
