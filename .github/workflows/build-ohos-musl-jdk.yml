name: build-ohos-musl-jdk

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/build-ohos-musl-jdk.yml'
      - 'scripts/build-jdk.sh'
      - 'scripts/verify-jdk.sh'
      - 'sysroot-ohos.tar.gz'

jobs:
  build-ohos-jdk:
    runs-on: ubuntu-24.04
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install boot JDK 21 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install LLVM 19 + build deps
        run: |
          echo "--- 装 LLVM 19 ---"
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc > /dev/null
          echo "deb http://apt.llvm.org/noble/ llvm-toolchain-noble-19 main" | sudo tee /etc/apt/sources.list.d/llvm-19.list
          sudo apt-get update
          sudo apt-get install -y \
            llvm-19 clang-19 lld-19 libc++-19-dev libc++abi-19-dev \
            autoconf automake libtool pkg-config \
            zip unzip git curl wget xz-utils

          echo ""
          echo "--- 验证 clang ---"
          clang-19 --version
          ld.lld-19 --version | head -1

      - name: Extract OHOS sysroot + create clang wrappers
        # 12 MB sysroot 已在 repo 内 (sysroot-ohos.tar.gz)
        # 用 Python heredoc 避免 YAML 解析问题
        run: |
          echo "--- 解压 OHOS sysroot ---"
          mkdir -p sysroot toolchain/bin
          tar -xzf sysroot-ohos.tar.gz -C sysroot
          ls sysroot/usr/include | head -5
          SYSROOT_DIR=$(pwd)/sysroot

          # 用 python heredoc 写 wrapper (避免 YAML 解析问题)
          python3 -c "
import os
sysroot = os.environ['SYSROOT_DIR']
wrapper_c = '''#!/bin/bash
exec /usr/bin/clang-19 \\
    --target=aarch64-linux-ohos \\
    --sysroot=''' + sysroot + ''' \\
    --gcc-toolchain=''' + sysroot + ''' \\
    -fuse-ld=/usr/bin/ld.lld-19 \\
    -rtlib=compiler-rt \\
    \"\$@\"
'''
with open('toolchain/bin/aarch64-unknown-linux-ohos-clang', 'w') as f:
    f.write(wrapper_c)
os.chmod('toolchain/bin/aarch64-unknown-linux-ohos-clang', 0o755)
wrapper_cxx = '''#!/bin/bash
exec /usr/bin/clang++-19 \\
    --target=aarch64-linux-ohos \\
    --sysroot=''' + sysroot + ''' \\
    --gcc-toolchain=''' + sysroot + ''' \\
    -fuse-ld=/usr/bin/ld.lld-19 \\
    -stdlib=libc++ \\
    -rtlib=compiler-rt \\
    \"\$@\"
'''
with open('toolchain/bin/aarch64-unknown-linux-ohos-clang++', 'w') as f:
    f.write(wrapper_cxx)
os.chmod('toolchain/bin/aarch64-unknown-linux-ohos-clang++', 0o755)
print('Wrappers created')
"
          export SYSROOT_DIR
          echo ""
          echo "--- 验证 wrapper ---"
          toolchain/bin/aarch64-unknown-linux-ohos-clang --version | head -1
          echo 'int main() { return 0; }' > /tmp/test.c
          toolchain/bin/aarch64-unknown-linux-ohos-clang -static /tmp/test.c -o /tmp/test_ohos 2>&1 | head -5
          file /tmp/test_ohos 2>&1 | head -1

          # 写到 env
          echo "CC=$(pwd)/toolchain/bin/aarch64-unknown-linux-ohos-clang" >> $GITHUB_ENV
          echo "CXX=$(pwd)/toolchain/bin/aarch64-unknown-linux-ohos-clang++" >> $GITHUB_ENV
          echo "SYSROOT=$SYSROOT_DIR" >> $GITHUB_ENV
          echo "TOOLCHAIN_DIR=$(pwd)/toolchain" >> $GITHUB_ENV

      - name: Build OHOS musl OpenJDK 21
        run: |
          chmod +x scripts/build-jdk.sh
          bash scripts/build-jdk.sh 2>&1 | tail -100

      - name: Upload JDK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ohos-musl-jdk-21-${{ github.sha }}
          path: build-output/ohos-musl-jdk-21.tar.gz
          retention-days: 30
          if-no-files-found: error

      - name: Upload verify script
        uses: actions/upload-artifact@v4
        with:
          name: verify-jdk-script
          path: scripts/verify-jdk.sh
          retention-days: 30

      - name: Print download info
        if: success()
        run: |
          echo ""
          echo "=========================================="
          echo "✅ OHOS musl OpenJDK 21 build done!"
          echo "=========================================="
          echo "Download: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          echo "Artifact: ohos-musl-jdk-21-${{ github.sha }}"
          echo ""
          echo "下一步："
          echo "1. 下载 artifact"
          echo "2. 推鸿蒙 PC + java -version 验证 H2b"
          echo "=========================================="
